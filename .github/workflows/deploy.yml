name: Deploy to Cloudflare Workers

# This workflow is a reference for users who fork this repo and want
# auto-deploy on merge to main. It does NOT run automatically on the
# upstream repo — trigger it manually from the Actions tab.
#
# To enable auto-deploy on your own fork:
#   1. Add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID as repo secrets
#   2. Change the trigger below from workflow_dispatch to:
#      on:
#        push:
#          branches: [main]

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy → Cloudflare Workers
    runs-on: ubuntu-latest

    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
