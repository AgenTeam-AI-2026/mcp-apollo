name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  ci:
    name: Typecheck · Build · Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Note: switch to cache: 'npm' once package-lock.json is committed
          # cache: 'npm'

      - name: Install dependencies
        # Using npm install (not npm ci) until package-lock.json is committed.
        # To fix: run `npm install` locally, commit the generated package-lock.json,
        # then change this line to `npm ci` and re-enable cache above.
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Build check (wrangler dry-run)
        run: npx wrangler deploy --dry-run --outdir dist
        env:
          CLOUDFLARE_API_TOKEN: placeholder-for-dry-run

      - name: Unit + RALPH-loop tests
        run: npm test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7
