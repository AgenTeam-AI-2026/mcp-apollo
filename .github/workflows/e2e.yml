name: E2E Smoke Tests

# Runs on a schedule (nightly) and can be triggered manually.
# Requires APOLLO_API_KEY to be set as a repo secret.
# Safe to skip — will no-op if the secret is not set.

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC every night
  workflow_dispatch:       # manual trigger from Actions tab

jobs:
  e2e:
    name: E2E → Live Apollo API
    runs-on: ubuntu-latest
    if: ${{ vars.APOLLO_E2E_ENABLED == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run E2E smoke tests
        env:
          APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
        run: npx vitest run test/e2e/smoke.test.ts
